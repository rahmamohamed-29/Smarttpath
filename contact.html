<body>

    <a href="#" class="logo">
      <img src="https://i.ibb.co/dsRLdz23/Whats-App-Image-2026-07-11-at-9-25-08-PM-1.jpg" alt="Logo" />

  <div class="contact-container">
     <div class="contact-info"> 
      <span class="badge">Contact us</span> 
      <h1>Let's keep in touch</h1>
       <p>Or you can contact us manually via<a href="">emaiil@.com</a></p> 
      </div>
       <div class="contact-form-container"> 
        <form class="contact-form"> 
          <div class="input-group">
             <label>Full Name</label> 
             <div class="input-wrapper"> 
              <input type="text" placeholder="Write your full name here...."> 
            </div>
           </div>
            <div class="input-group">
               <label>Email</label>
                <div class="input-wrapper"> 
                   <input type="email" placeholder="Write your Email...."> 
                  </div>
                 </div>
                  <div class="input-group"> 
                    <label>Phone Number</label>
                     <div class="input-wrapper phone-input">
                       <input type="tel" placeholder="+20----------">
                       </div>
                       </div>
                        <div class="input-group">
                           <label>The Message</label>
                            <textarea placeholder="Write Your Message..... " maxlength="300"></textarea> 
                            <span class="char-count">300/300</span> 
                          </div>
                           <div class="checkbox-group">
                             <input type="checkbox" id="privacy" required=""> 
                             <label for="privacy">I agree to the terms <span>Privacy Policy</span>.
                            </label> 
                            </div>
                             <button type="submit" class="submit-btn"> Send </button> 
                            </form>
                           </div>
                           </div>
    
</body>
