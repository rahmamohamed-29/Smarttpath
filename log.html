<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div class="contain">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>
        
        <div class="form login">
            <h1 class="animi" style="--i:0; --j:21;">Log In</h1>
            <form >
                <div class="input-box animi" style="--i:1; --j:22;">
                    <input type="text" required>
                    <label>Username</label>
                    <i class="bx bx-user"></i>
                </div>
                
                <div class="input-box animi" style="--i:2; --j:23;">
                    <input type="password" required>
                    <label>Password</label>
                    <i class="bx bx-lock"></i>
                </div>
                
                <button type="submit" class="btn animi" style="--i:3; --j:24;">Login</button>
                
                <div class="link animi" style="--i:4; --j:25;">
                    <p class="to">Don't have an account? <a href="#" class="registerr">Sign Up</a></p> 
                </div>
            </form>
        </div>

        <div class="info-text login">
            <h2 class="animi" style="--i:0; --j:20;">Welcome Back!</h2>
            <p class="animi" style="--i:1; --j:21;">Enter your personal details to use all of site features</p>
        </div>

        <div class="form register">
            <h1 class="animi" style="--i:17; --j:0;">Sign Up</h1>
            <form action="#">
                <div class="input-box animi" style="--i:18; --j:1;">
                    <input type="text" required>
                    <label>Username</label>
                    <i class="bx bx-user"></i>
                </div>
                <div class="input-box animi" style="--i:19; --j:2;">
                    <input type="email" required>
                    <label>Email</label>
                    <i class="bx bx-envelope"></i>
                </div>
                
                <div class="input-box animi" style="--i:20; --j:3;">
                    <input type="password" required>
                    <label>Password</label>
                    <i class="bx bx-lock"></i>
                </div>
                
                <button type="submit" class="btn animi" style="--i:21; --j:4;">Sign Up</button>
                
                <div class="link animi" style="--i:22; --j:5;">
                    <p>Already have an account? <a href="#" class="loginn">Login</a></p> 
                </div>
            </form>
        </div>

        <div class="info-text register">
            <h2 class="animi" style="--i:17; --j:0;">Hello, Friend!</h2>
            <p class="animi" style="--i:18; --j:1;">Register with your personal details to use all of site features</p>
        </div>

    </div>
    <script src="log.js"></script>
</body>
</html>
